<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>宏全集團 AI 推動管理系統</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="sidebar-logo">
        <div class="logo-badge">AI</div>
        <div>
          <div class="logo-title">宏全集團</div>
          <div class="logo-sub">AI 推動管理系統</div>
        </div>
      </div>
      <nav class="sidebar-nav">
        <a class="nav-item" data-page="dashboard" onclick="navigate('dashboard')">
          <span class="nav-icon">📊</span>集團總覽
        </a>
        <a class="nav-item" data-page="plan" onclick="navigate('plan')">
          <span class="nav-icon">🗺️</span>導入計畫
        </a>
        <a class="nav-item" data-page="units" onclick="navigate('units')">
          <span class="nav-icon">🏭</span>單位追蹤
        </a>
        <a class="nav-item" data-page="requirements" onclick="navigate('requirements')">
          <span class="nav-icon">🔍</span>需求管理
        </a>
        <a class="nav-item" data-page="cases" onclick="navigate('cases')">
          <span class="nav-icon">💡</span>AI 應用案例
        </a>
        <a class="nav-item" data-page="talent" onclick="navigate('talent')">
          <span class="nav-icon">👥</span>AI 人才網路
        </a>
        <a class="nav-item" data-page="training" onclick="navigate('training')">
          <span class="nav-icon">🎓</span>課程安排
        </a>
        <div class="nav-divider"></div>
        <a class="nav-item" data-page="api" onclick="navigate('api')">
          <span class="nav-icon">💳</span>API 用量
        </a>
        <a class="nav-item" data-page="changelog" onclick="navigate('changelog')">
          <span class="nav-icon">📋</span>修改記錄
        </a>
      </nav>
      <div class="sidebar-footer">v2.7.0 · 資料來源：Google Sheets</div>
    </aside>

    <div class="main">
      <header class="topbar">
        <div class="topbar-left">
          <button class="hamburger" onclick="toggleSidebar()" aria-label="開啟選單">
            <span></span><span></span><span></span>
          </button>
          <h1 class="page-title" id="page-title">集團總覽</h1>
        </div>
        <div class="topbar-right">
          <span class="update-badge" id="update-date">資料更新：—</span>
        </div>
      </header>
      <div class="content" id="content"></div>
    </div>
    <div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleSidebar()"></div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/sheets.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
